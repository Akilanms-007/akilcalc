
<style>
*{box-sizing:border-box;margin:0;padding:0}
.calc-wrap{font-family:var(--font-mono,monospace);max-width:520px;margin:1rem auto;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary)}
.display-area{background:var(--color-background-secondary);padding:1rem 1.25rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.mode-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.mode-btn{font-size:11px;padding:3px 10px;border:0.5px solid var(--color-border-secondary);border-radius:20px;background:transparent;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-mono)}
.mode-btn.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.expr-line{font-size:12px;color:var(--color-text-secondary);min-height:16px;margin-bottom:4px;word-break:break-all}
.result-line{font-size:28px;font-weight:500;color:var(--color-text-primary);text-align:right;min-height:36px;word-break:break-all}
.unit-line{font-size:12px;color:var(--color-text-secondary);text-align:right;min-height:16px}
.history-row{font-size:11px;color:var(--color-text-tertiary);margin-top:6px;min-height:14px;word-break:break-all}
.tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary)}
.tab{flex:1;padding:8px 4px;font-size:12px;text-align:center;cursor:pointer;color:var(--color-text-secondary);border:none;background:transparent;font-family:var(--font-mono);border-bottom:2px solid transparent}
.tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary)}
.panel{display:none;padding:10px}
.panel.active{display:block}
.btn-grid{display:grid;gap:5px}
.btn-grid.cols5{grid-template-columns:repeat(5,1fr)}
.btn-grid.cols4{grid-template-columns:repeat(4,1fr)}
.btn-grid.cols3{grid-template-columns:repeat(3,1fr)}
.btn-grid.cols2{grid-template-columns:repeat(2,1fr)}
button.k{padding:10px 4px;font-size:13px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;font-family:var(--font-mono);transition:background 0.1s}
button.k:active{background:var(--color-background-secondary)}
button.k.op{color:var(--color-text-info)}
button.k.fn{font-size:11px;color:var(--color-text-secondary)}
button.k.accent{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
button.k.eq{background:var(--color-background-success);color:var(--color-text-success);border-color:var(--color-border-success)}
button.k.danger{color:var(--color-text-danger)}
.section-label{font-size:11px;color:var(--color-text-tertiary);margin:8px 0 4px;padding-left:2px}
.conv-row{display:grid;grid-template-columns:1fr 80px 1fr 80px;gap:6px;align-items:center;margin-bottom:8px}
.conv-row input{padding:7px 8px;font-size:13px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-mono);width:100%}
.conv-row select{padding:7px 4px;font-size:12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-mono);width:100%}
.arrow{text-align:center;color:var(--color-text-secondary);font-size:14px}
</style>

<script>
let expr = '';
let ans = 0;
let angleMode = 'deg';
let shifted = false;
let history = [];

function toRad(x){
  if(angleMode==='deg') return x*Math.PI/180;
  if(angleMode==='grad') return x*Math.PI/200;
  return x;
}
function fromRad(x){
  if(angleMode==='deg') return x*180/Math.PI;
  if(angleMode==='grad') return x*200/Math.PI;
  return x;
}
function fact(n){if(n<0||!Number.isInteger(n))return NaN;if(n===0)return 1;let r=1;for(let i=2;i<=n;i++)r*=i;return r;}
function nCr(n,r){return fact(n)/(fact(r)*fact(n-r));}
function nPr(n,r){return fact(n)/fact(n-r);}

const wrapTrig = (fn)=>(...a)=>fn(...a.map(toRad));
const wrapATrig = (fn)=>(...a)=>fromRad(fn(...a));

const origSin=Math.sin,origCos=Math.cos,origTan=Math.tan;
const origASin=Math.asin,origACos=Math.acos,origATan=Math.atan,origATan2=Math.atan2;

function inp(v){
  if(expr==='Error')expr='';
  expr+=v;
  render();
}
function inputFn(open,close){
  if(expr==='Error')expr='';
  expr+=open;
  render();
  pendingClose=close;
}
let pendingClose='';
function inpShift(norm,inv,close){
  if(expr==='Error')expr='';
  expr+=(shifted?inv:norm);
  render();
}
function clearAll(){expr='';document.getElementById('result').textContent='0';document.getElementById('expr').textContent='';document.getElementById('unit-line').textContent='';render();}
function backspace(){expr=expr.slice(0,-1);render();}
function render(){document.getElementById('expr').textContent=expr.replace(/Math\./g,'').replace(/\*\*/g,'^').replace(/\*/g,'×').replace(/\//g,'÷');}

function calculate(){
  try{
    let e=expr.replace(/ANS/g,String(ans));
    const s={
      sin:(...a)=>origSin(toRad(...a)),
      cos:(...a)=>origCos(toRad(...a)),
      tan:(...a)=>origTan(toRad(...a)),
      asin:(...a)=>fromRad(origASin(...a)),
      acos:(...a)=>fromRad(origACos(...a)),
      atan:(...a)=>fromRad(origATan(...a)),
      sinh:Math.sinh,cosh:Math.cosh,tanh:Math.tanh,
      asinh:Math.asinh,acosh:Math.acosh,atanh:Math.atanh,
      log10:Math.log10,log:Math.log,log2:Math.log2,
      exp:Math.exp,sqrt:Math.sqrt,abs:Math.abs,
      floor:Math.floor,ceil:Math.ceil,
      PI:Math.PI,E:Math.E,
      fact,nCr,nPr
    };
    let fn=new Function(...Object.keys(s),'return ('+e.replace(/Math\./g,'')+')');
    let res=fn(...Object.values(s));
    if(typeof res!=='number'||isNaN(res)){document.getElementById('result').textContent='Error';return;}
    history.unshift(expr+'='+fmtNum(res));
    if(history.length>3)history.pop();
    document.getElementById('history').textContent=history.slice(1).join('  |  ');
    ans=res;
    expr='';
    document.getElementById('expr').textContent='';
    document.getElementById('result').textContent=fmtNum(res);
    document.getElementById('unit-line').textContent='';
  }catch(err){document.getElementById('result').textContent='Error';}
}

function fmtNum(n){
  if(Math.abs(n)>=1e15||( Math.abs(n)<1e-9&&n!==0))return n.toExponential(6);
  let s=parseFloat(n.toPrecision(10));
  return String(s);
}

function setAngle(m){
  angleMode=m;
  ['deg','rad','grad'].forEach(x=>document.getElementById('btn-'+x).classList.remove('active'));
  document.getElementById('btn-'+m).classList.add('active');
}
function toggleShift(){
  shifted=!shifted;
  document.getElementById('btn-shift').classList.toggle('active',shifted);
}
function showTab(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  event.target.classList.add('active');
}

function showSolver(html){
  const d=document.getElementById('eng-solver');
  d.style.display='block';
  d.innerHTML=html;
}
function solverRow(label,id){
  return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><label style="font-size:12px;color:var(--color-text-secondary);width:80px">${label}</label><input id="${id}" type="number" placeholder="?" style="flex:1;padding:5px 8px;font-size:13px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-mono)"></div>`;
}
function solveOhm(){
  showSolver(`<div style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px">Ohm's law — leave one field blank</div>`+
    solverRow('V (volts)','ohm-v')+solverRow('I (amps)','ohm-i')+solverRow('R (ohms)','ohm-r')+
    `<button class="k fn" style="width:100%;margin-top:4px" onclick="calcOhm()">Solve</button><div id="ohm-out" style="font-size:13px;color:var(--color-text-info);margin-top:8px"></div>`);
}
function calcOhm(){
  let v=document.getElementById('ohm-v').value;
  let i=document.getElementById('ohm-i').value;
  let r=document.getElementById('ohm-r').value;
  let out='';
  if(!v&&i&&r){out='V = '+parseFloat((i*r).toPrecision(6))+' V';}
  else if(v&&!i&&r){out='I = '+parseFloat((v/r).toPrecision(6))+' A';}
  else if(v&&i&&!r){out='R = '+parseFloat((v/i).toPrecision(6))+' Ω';}
  else{out='Fill exactly two fields.';}
  document.getElementById('ohm-out').textContent=out;
}
function solvePower(){
  showSolver(`<div style="font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px">Power — leave one field blank</div>`+
    solverRow('P (watts)','pw-p')+solverRow('I (amps)','pw-i')+solverRow('V (volts)','pw-v')+
    `<button class="k fn" style="width:100%;margin-top:4px" onclick="calcPower()">Solve</button><div id="pw-out" style="font-size:13px;color:var(--color-text-info);margin-top:8px"></div>`);
}
function calcPower(){
  let p=document.getElementById('pw-p').value;
  let i=document.getElementById('pw-i').value;
  let v=document.getElementById('pw-v').value;
  let out='';
  if(!p&&i&&v){out='P = '+parseFloat((i*v).toPrecision(6))+' W';}
  else if(p&&!i&&v){out='I = '+parseFloat((p/v).toPrecision(6))+' A';}
  else if(p&&i&&!v){out='V = '+parseFloat((p/i).toPrecision(6))+' V';}
  else{out='Fill exactly two fields.';}
  document.getElementById('pw-out').textContent=out;
}

function convert(type){
  let a=parseFloat(document.getElementById('c-'+type+'-a').value);
  let ua=parseFloat(document.getElementById('c-'+type+'-ua').value);
  let ub=parseFloat(document.getElementById('c-'+type+'-ub').value);
  if(!isNaN(a)){
    let res=parseFloat(((a*ua)/ub).toPrecision(8));
    document.getElementById('c-'+type+'-b').value=res;
  }
}
function convertBack(type){
  let b=parseFloat(document.getElementById('c-'+type+'-b').value);
  let ua=parseFloat(document.getElementById('c-'+type+'-ua').value);
  let ub=parseFloat(document.getElementById('c-'+type+'-ub').value);
  if(!isNaN(b)){
    let res=parseFloat(((b*ub)/ua).toPrecision(8));
    document.getElementById('c-'+type+'-a').value=res;
  }
}
function convertTemp(){
  let a=parseFloat(document.getElementById('c-temp-a').value);
  let ua=document.getElementById('c-temp-ua').value;
  let ub=document.getElementById('c-temp-ub').value;
  if(isNaN(a))return;
  let celsius;
  if(ua==='°C')celsius=a;
  else if(ua==='°F')celsius=(a-32)/1.8;
  else celsius=a-273.15;
  let res;
  if(ub==='°C')res=celsius;
  else if(ub==='°F')res=celsius*1.8+32;
  else res=celsius+273.15;
  document.getElementById('c-temp-b').value=parseFloat(res.toPrecision(7));
}

document.addEventListener('keydown',function(e){
  if(e.key>='0'&&e.key<='9')inp(e.key);
  else if(e.key==='+')inp('+');
  else if(e.key==='-')inp('-');
  else if(e.key==='*')inp('*');
  else if(e.key==='/')inp('/');
  else if(e.key==='.')inp('.');
  else if(e.key==='('||e.key===')')inp(e.key);
  else if(e.key==='Enter'||e.key==='=')calculate();
  else if(e.key==='Backspace')backspace();
  else if(e.key==='Escape')clearAll();
});
</script>
